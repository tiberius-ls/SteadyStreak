<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="64" y1="32" x2="448" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1830"/>
      <stop offset="1" stop-color="#07101F"/>
    </linearGradient>
    <linearGradient id="flame" x1="256" y1="72" x2="256" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD24A"/>
      <stop offset="0.55" stop-color="#FF9F1A"/>
      <stop offset="1" stop-color="#1EC8FF"/>
    </linearGradient>
    <linearGradient id="ring" x1="120" y1="120" x2="392" y2="392" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1EC8FF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#1EC8FF" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="18" y="18" width="476" height="476" rx="96" stroke="url(#ring)" stroke-width="8" fill="none"/>
  <!-- slightly higher composition for wordmark -->
  <rect x="148" y="318" width="216" height="32" rx="16" fill="#3DD68C"/>
  <circle cx="256" cy="334" r="12" fill="#F2F7FF"/>
  <g filter="url(#glow)">
    <path d="M256 88c-16 46 24 64 24 110 0 42-24 74-24 74s-24-32-24-74c0-46 40-64 24-110z" fill="url(#flame)"/>
    <path d="M256 148c-7 28 12 37 12 64 0 24-12 42-12 42s-12-18-12-42c0-27 19-36 12-64z" fill="#1EC8FF" opacity="0.95"/>
  </g>
  <!-- wordmark -->
  <text x="256" y="420" text-anchor="middle" fill="#F2F7FF" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="48" font-weight="800" letter-spacing="-1">Steady</text>
  <text x="256" y="468" text-anchor="middle" fill="#1EC8FF" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="48" font-weight="800" letter-spacing="-1">Streak</text>
</svg>
